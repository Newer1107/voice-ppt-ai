version: "3.9"

networks:
  ai-network:
    driver: bridge

volumes:
  model_cache:
  voice_embeddings:

services:
  sglang:
    image: lmsysorg/sglang:latest
    command:
      - "python3"
      - "-m"
      - "sglang.launch_server"
      - "--model-path"
      - "Qwen/Qwen3-8B"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "30000"
      - "--mem-fraction-static"
      - "0.90"
      - "--context-length"
      - "32768"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    volumes:
      - model_cache:/root/.cache/huggingface
    expose:
      - "30000"
    networks:
      - ai-network
    restart: unless-stopped

  gpu-service:
    build:
      context: ../ai-server/service
      dockerfile: Dockerfile
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]
    environment:
      - WHISPER_MODEL_SIZE=large-v3
      - WHISPER_DEVICE=cuda
      - WHISPER_COMPUTE_TYPE=float16
      - EMBEDDING_DEVICE=cuda
      - EMBEDDING_BATCH_SIZE=32
      - TTS_DEVICE=cuda
      - TTS_SAMPLE_RATE=24000
      - LLM_API_URL=http://sglang:30000/v1
      - LLM_MODEL=Qwen/Qwen3-8B
      # Data directories (Docker volumes mounted at these paths)
      - DATA_DIR=/data
      - VOICE_EMBEDDINGS_DIR=/data/voice_embeddings
      - CACHE_DIR=/data/cache
    volumes:
      - model_cache:/root/.cache
      - voice_embeddings:/data/voice_embeddings
    expose:
      - "8001"
    networks:
      - ai-network
    restart: unless-stopped
