version: "3.9"

networks:
  web-network:
    driver: bridge
  ai-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - web-network
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:80/api
    expose:
      - "3000"
    networks:
      - web-network
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      - STORAGE_ROOT=/data/storage
      - DATA_DIR=/data
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage_data:/data/storage
    networks:
      - web-network
      - ai-network
    restart: unless-stopped

  celery-worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A src.worker.celery_app worker -Q default,audio,transcription,llm,tts,pptx,priority_high -l INFO --concurrency=2
    env_file:
      - ../.env
    environment:
      - STORAGE_ROOT=/data/storage
      - DATA_DIR=/data
    depends_on:
      - backend
      - redis
    volumes:
      - storage_data:/data/storage
    networks:
      - web-network
      - ai-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lecture_narrator
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d lecture_narrator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-devpassword}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - web-network
    restart: unless-stopped
